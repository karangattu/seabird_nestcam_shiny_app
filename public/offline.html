<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Seabird NestCam Offline</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f4f7f6;
        color: #172326;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(520px, calc(100% - 32px));
        border: 1px solid #d9e2df;
        border-radius: 8px;
        background: #fff;
        padding: 28px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.4rem;
      }
      p {
        margin: 0;
        color: #5f6f73;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Seabird NestCam is offline</h1>
      <p>The annotation workspace will reopen once this device has a connection again.</p>
    </main>
  </body>
</html>
